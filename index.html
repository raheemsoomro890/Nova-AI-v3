```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova AI</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="startupScreen">
    <div id="bootText">Initializing...</div>
  </div>

  <div class="app">

    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo"></div>
        <div class="brand">Nova AI</div>
      </div>

      <button id="newChatBtn" type="button">
        <span>+ New Chat</span>
      </button>

      <div id="chatHistory"></div>
    </aside>

    <main class="main">

      <div id="messages"></div>

      <div class="input-area">
        <textarea id="userInput" rows="1" placeholder="Message Nova AI..."></textarea>
        <button id="micBtn" type="button" title="Voice input">🎤</button>
        <button id="sendBtn" type="button" title="Send message">➤</button>
      </div>

    </main>

  </div>

  <script src="script.js"></script>
</body>
</html>
```
