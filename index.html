<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nova AI</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- Startup Screen -->
  <div id="startupScreen">
    <div class="startup-content">

      <div class="nova-ring">
        <div class="ring1"></div>
        <div class="ring2"></div>
        <div class="ring3"></div>

        <div class="nova-text">
          NOVA AI
        </div>
      </div>

      <p id="bootText">
        Initializing...
      </p>

    </div>
  </div>

  <!-- App -->
  <div class="app">

    <!-- Sidebar -->
    <aside class="sidebar">

      <div class="logo">
        🤖 <span>Nova AI</span>
      </div>

      <button id="newChatBtn" class="new-chat">
        + New Chat
      </button>

      <h3 class="history-heading">
        Recent Chats
      </h3>

      <div id="chatHistory" class="chat-history"></div>

    </aside>

    <!-- Main -->
    <main class="main">

      <header class="topbar">

        <div>
          <h1>Nova AI</h1>
          <p>Your Intelligent AI Assistant</p>
        </div>

        <div class="status">
          🟢 Online
        </div>

      </header>

      <section class="chat-container">

        <div id="messages" class="messages"></div>

        <div class="input-area">

          <input
            type="text"
            id="userInput"
            placeholder="Message Nova AI..."
            autocomplete="off">

          <button id="micBtn" class="mic-btn">
            🎤
          </button>

          <button id="sendBtn">
            ➤
          </button>

        </div>

      </section>

    </main>

  </div>

  <script src="script.js"></script>

</body>

  </html>
